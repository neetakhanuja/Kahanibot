<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kahani</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <style>
    :root{
      --bg:#f7f5f2;
      --card:#ffffff;
      --border:#e6e2dc;
      --text:#1f1f1f;
      --muted:#6b6b6b;
      --accent:#2f6f4e;
      --accentSoft:#e8f1eb;
      --soft:#f1efe9;
      --mic:#6b4eff;
      --micOn:#d43b3b;
      --shadow:0 2px 8px rgba(0,0,0,0.05);
    }
    *{ box-sizing:border-box; }
    html, body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height:100%;
    }
    body{
      min-height:100vh;
    }
    .app{
      max-width:760px;
      margin:0 auto;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      padding-bottom:16px;
    }
    header{
      padding:16px 16px 8px;
      text-align:center;
      font-size:28px;
      font-weight:800;
    }
    .topbar{
      display:none;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:0 14px 10px;
    }
    .topbar.show{ display:flex; }
    .namePill{
      background:#fff;
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 14px;
      font-size:15px;
      min-height:42px;
      display:flex;
      align-items:center;
    }
    .topActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .screen{
      display:none;
      flex:1;
      padding:0 14px 14px;
    }
    .screen.active{
      display:block;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
      box-shadow:var(--shadow);
    }
    .stack{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .label{
      font-size:14px;
      color:var(--muted);
      margin-bottom:6px;
    }
    input, select, textarea{
      width:100%;
      font-size:18px;
      border:1px solid #d8d4ce;
      border-radius:14px;
      padding:14px;
      background:#fff;
      color:var(--text);
      outline:none;
    }
    textarea{
      resize:vertical;
      min-height:110px;
      line-height:1.6;
    }
    button{
      border:none;
      cursor:pointer;
      border-radius:14px;
      padding:14px 16px;
      font-size:18px;
    }
    button:disabled{
      opacity:0.6;
      cursor:not-allowed;
    }
    .primary{
      background:var(--accent);
      color:#fff;
    }
    .secondary{
      background:var(--soft);
      color:#333;
      border:1px solid var(--border);
    }
    .ghost{
      background:#fff;
      color:#333;
      border:1px solid var(--border);
    }
    .full{ width:100%; }
    .title{
      font-size:28px;
      line-height:1.25;
      font-weight:750;
      margin-bottom:8px;
      text-align:center;
    }
    .subtitle{
      font-size:18px;
      line-height:1.55;
      color:var(--muted);
      text-align:center;
    }
    .homeButtons{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-top:18px;
    }
    .homeBtn{
      text-align:left;
      padding:18px;
      border-radius:18px;
      background:#fff;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
    }
    .homeBtn strong{
      display:block;
      font-size:22px;
      margin-bottom:6px;
      color:var(--text);
    }
    .homeBtn span{
      display:block;
      font-size:16px;
      line-height:1.5;
      color:var(--muted);
    }
    .topicWrap{
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .topicCard{
      min-height:260px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
      font-size:32px;
      line-height:1.35;
      font-weight:700;
      background:#fff;
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      user-select:none;
      touch-action:pan-y;
    }
    .topicCount{
      text-align:center;
      color:var(--muted);
      font-size:16px;
    }
    .row{
      display:flex;
      gap:10px;
    }
    .row > *{ flex:1; }
    .storyScreen{
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .promptChip{
      display:none;
      background:var(--accentSoft);
      border:1px solid #c9ddcf;
      color:#234635;
      border-radius:16px;
      padding:14px;
      font-size:18px;
      line-height:1.5;
    }
    .agentCard{
      background:#fff;
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:18px;
    }
    .agentLabel{
      font-size:14px;
      color:var(--muted);
      margin-bottom:8px;
    }
    .agentText{
      font-size:28px;
      line-height:1.45;
      white-space:pre-wrap;
    }
    .agentActions{
      display:flex;
      justify-content:flex-end;
      margin-top:12px;
    }
    .smallBtn{
      font-size:16px;
      padding:11px 14px;
      border-radius:12px;
    }
    .micArea{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      padding:8px 0 2px;
    }
    .micBtn{
      width:110px;
      height:110px;
      border-radius:999px;
      background:var(--mic);
      border:none;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 12px 28px rgba(107,78,255,0.22);
    }
    .micBtn.listening{
      background:var(--micOn);
      box-shadow:0 12px 28px rgba(212,59,59,0.18);
    }
    .micBtn svg{
      width:42px;
      height:42px;
      fill:#fff;
    }
    .micHint{
      font-size:18px;
      line-height:1.5;
      color:var(--muted);
      text-align:center;
      max-width:520px;
    }
    .typePanel{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .finishRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-top:4px;
    }
    .finishRow .left{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .finishRow .right{
      margin-left:auto;
    }
    .finishBtn{
      min-width:180px;
    }
    .reviewText{
      font-size:20px;
      line-height:1.7;
      white-space:pre-wrap;
      max-height:56vh;
      overflow:auto;
    }
    .note{
      font-size:14px;
      line-height:1.5;
      color:var(--muted);
      text-align:center;
    }
    .hidden{ display:none !important; }

    @media (max-width: 520px){
      header{ font-size:26px; }
      .title{ font-size:25px; }
      .subtitle{ font-size:17px; }
      .topicCard{ min-height:240px; font-size:28px; }
      .agentText{ font-size:24px; }
      .finishRow{ align-items:stretch; flex-direction:column; }
      .finishRow .left, .finishRow .right{ width:100%; }
      .finishBtn{ width:100%; min-width:0; }
      .row{ flex-direction:column; }
      .topbar{ align-items:flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>Kahani</header>

    <div class="topbar" id="topbar">
      <div class="namePill" id="namePill"></div>
      <div class="topActions">
        <button class="secondary smallBtn" id="storiesBtn" onclick="openStories()"></button>
      </div>
    </div>

    <div class="screen active" id="screenWelcome">
      <div class="card stack">
        <div class="title" id="welcomeTitle"></div>
        <div class="subtitle" id="welcomeSubtitle"></div>

        <div>
          <div class="label" id="labelName"></div>
          <input id="firstName" />
        </div>

        <div>
          <div class="label" id="labelAge"></div>
          <input id="age" inputmode="numeric" />
        </div>

        <div>
          <div class="label" id="labelLang"></div>
          <select id="lang">
            <option value="hi">Hindi</option>
            <option value="gu">Gujarati</option>
            <option value="en">English</option>
          </select>
        </div>

        <button class="primary full" onclick="saveProfile()" id="continueBtn"></button>
      </div>
    </div>

    <div class="screen" id="screenHome">
      <div class="card">
        <div class="title" id="homeTitle"></div>
        <div class="subtitle" id="homeSubtitle"></div>
        <div class="homeButtons">
          <button class="homeBtn" onclick="beginStoryMode()">
            <strong id="haveStoryTitle"></strong>
            <span id="haveStorySub"></span>
          </button>
          <button class="homeBtn" onclick="goToTopics()">
            <strong id="wantTopicTitle"></strong>
            <span id="wantTopicSub"></span>
          </button>
        </div>
      </div>
    </div>

    <div class="screen" id="screenTopics">
      <div class="topicWrap">
        <div class="card">
          <div class="title" id="topicTitle"></div>
          <div class="subtitle" id="topicSubtitle"></div>
        </div>

        <div class="topicCard" id="topicCard"></div>
        <div class="topicCount" id="topicCount"></div>

        <div class="row">
          <button class="secondary" onclick="prevCard()" id="prevBtn"></button>
          <button class="secondary" onclick="nextCard()" id="nextBtn"></button>
        </div>

        <button class="primary full" onclick="selectPrompt()" id="selectPromptBtn"></button>
        <button class="ghost full" onclick="goHome()" id="backHomeBtn"></button>
      </div>
    </div>

    <div class="screen" id="screenStory">
      <div class="storyScreen">
        <div class="promptChip" id="promptChip"></div>

        <div class="agentCard">
          <div class="agentLabel" id="agentLabel"></div>
          <div class="agentText" id="agentText">…</div>
          <div class="agentActions">
            <button class="ghost smallBtn" onclick="speakAgentText()" id="hearBtn"></button>
          </div>
        </div>

        <div class="card micArea">
          <button class="micBtn" id="micBtn" onclick="toggleMic()" title="Speak">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
            </svg>
          </button>
          <div class="micHint" id="micHint"></div>
        </div>

        <div class="card typePanel">
          <button class="ghost" onclick="toggleTyping()" id="typingToggleBtn"></button>
          <div id="typingArea" class="hidden">
            <textarea id="typeInput"></textarea>
            <button class="secondary full" onclick="sendTyped()" id="sendTypedBtn"></button>
          </div>
        </div>

        <div class="finishRow">
          <div class="left">
            <button class="ghost smallBtn" onclick="goHome()" id="homeBtnStory"></button>
          </div>
          <div class="right">
            <button class="primary finishBtn" onclick="finishStory()" id="finishStoryBtn"></button>
          </div>
        </div>
      </div>
    </div>

    <div class="screen" id="screenReview">
      <div class="card stack">
        <div class="title" id="reviewTitle"></div>
        <div class="subtitle" id="reviewSubtitle"></div>
        <div class="reviewText" id="draftBox"></div>
        <div class="row">
          <button class="primary" onclick="saveStory()" id="saveBtn"></button>
          <button class="secondary" onclick="editStory()" id="editBtn"></button>
        </div>
      </div>
    </div>

    <div class="screen" id="screenSuccess">
      <div class="card stack">
        <div class="title" id="successTitle"></div>
        <div class="subtitle" id="successSubtitle"></div>
        <button class="primary full" onclick="goHome()" id="anotherStoryBtn"></button>
        <button class="secondary full" onclick="openStories()" id="viewStoriesBtn"></button>
      </div>
    </div>
  </div>

      cards: [],
      cardIndex: 0,
      typingOpen: false,
      lastServerData: null,
      currentScreen: "screenWelcome"
    };

    const els = {
      topbar: document.getElementById("topbar"),
      namePill: document.getElementById("namePill"),
      storiesBtn: document.getElementById("storiesBtn"),
      firstName: document.getElementById("firstName"),
      age: document.getElementById("age"),
      lang: document.getElementById("lang"),
      screenWelcome: document.getElementById("screenWelcome"),
      screenHome: document.getElementById("screenHome"),
      screenTopics: document.getElementById("screenTopics"),
      screenStory: document.getElementById("screenStory"),
      screenReview: document.getElementById("screenReview"),
      screenSuccess: document.getElementById("screenSuccess"),
      topicCard: document.getElementById("topicCard"),
      topicCount: document.getElementById("topicCount"),
      promptChip: document.getElementById("promptChip"),
      agentText: document.getElementById("agentText"),
      micBtn: document.getElementById("micBtn"),
      micHint: document.getElementById("micHint"),
      typingArea: document.getElementById("typingArea"),
      typeInput: document.getElementById("typeInput"),
      draftBox: document.getElementById("draftBox"),
    };

    function t(){
      return UI[state.lang] || UI.en;
    }

    function showScreen(id){
      ["screenWelcome","screenHome","screenTopics","screenStory","screenReview","screenSuccess"].forEach((screenId) => {
        document.getElementById(screenId).classList.remove("active");
      });
      document.getElementById(id).classList.add("active");
      state.currentScreen = id;
    }

    function setBusy(on){
      state.busy = !!on;
      document.querySelectorAll("button").forEach((btn) => {
        if (btn.id !== "storiesBtn") btn.disabled = state.busy;
      });
      els.storiesBtn.disabled = !state.userId;
    }

    function applyUIText(){
      const s = t();
      document.documentElement.lang = state.lang;
      document.getElementById("welcomeTitle").textContent = s.welcomeTitle;
      document.getElementById("welcomeSubtitle").textContent = s.welcomeSubtitle;
      document.getElementById("labelName").textContent = s.labelName;
      document.getElementById("labelAge").textContent = s.labelAge;
      document.getElementById("labelLang").textContent = s.labelLang;
      els.firstName.placeholder = s.namePlaceholder;
      els.age.placeholder = s.agePlaceholder;
      document.getElementById("continueBtn").textContent = s.continueBtn;
      els.storiesBtn.textContent = s.myStories;
      document.getElementById("homeTitle").textContent = s.homeTitle;
      document.getElementById("homeSubtitle").textContent = s.homeSubtitle;
      document.getElementById("haveStoryTitle").textContent = s.haveStoryTitle;
      document.getElementById("haveStorySub").textContent = s.haveStorySub;
      document.getElementById("wantTopicTitle").textContent = s.wantTopicTitle;
      document.getElementById("wantTopicSub").textContent = s.wantTopicSub;
      document.getElementById("topicTitle").textContent = s.topicTitle;
      document.getElementById("topicSubtitle").textContent = s.topicSubtitle;
      document.getElementById("prevBtn").textContent = s.prevBtn;
      document.getElementById("nextBtn").textContent = s.nextBtn;
      document.getElementById("selectPromptBtn").textContent = s.selectPromptBtn;
      document.getElementById("backHomeBtn").textContent = s.backHomeBtn;
      document.getElementById("agentLabel").textContent = s.agentLabel;
      document.getElementById("hearBtn").textContent = s.hearBtn;
      document.getElementById("typingToggleBtn").textContent = state.typingOpen ? s.typingToggleClose : s.typingToggleOpen;
      els.typeInput.placeholder = s.typePlaceholder;
      document.getElementById("sendTypedBtn").textContent = s.sendTypedBtn;
      document.getElementById("homeBtnStory").textContent = s.homeBtnStory;
      document.getElementById("finishStoryBtn").textContent = s.finishStoryBtn;
      document.getElementById("reviewTitle").textContent = s.reviewTitle;
      document.getElementById("reviewSubtitle").textContent = s.reviewSubtitle;
      document.getElementById("saveBtn").textContent = s.saveBtn;
      document.getElementById("editBtn").textContent = s.editBtn;
      document.getElementById("successTitle").textContent = s.successTitle;
      document.getElementById("successSubtitle").textContent = s.successSubtitle;
      document.getElementById("anotherStoryBtn").textContent = s.anotherStoryBtn;
      document.getElementById("viewStoriesBtn").textContent = s.viewStoriesBtn;
      if (!listening) {
        els.micHint.textContent = SpeechRecognition ? s.micHint : s.micUnsupported;
      }
      renderTopicCard();
      renderPromptChip();
    }

    function saveProfile(){
      const firstName = String(els.firstName.value || "").trim();
      const age = String(els.age.value || "").trim();
      const lang = els.lang.value;

      if (!firstName || !age){
        alert((UI[lang] || UI.en).saveProfileError);
        return;
      }

      state.firstName = firstName;
      state.age = age;
      state.lang = lang;
      state.userId = normId(firstName) + age;

      localStorage.setItem("kahanibot_profile_v3", JSON.stringify({
        firstName: state.firstName,
        age: state.age,
        lang: state.lang,
        userId: state.userId,
      }));

      initAfterProfile();
      goHome();
    }

    function loadProfile(){
      const raw = localStorage.getItem("kahanibot_profile_v3") || localStorage.getItem("kahanibot_profile_v2");
      if (!raw) return false;
      try{
        const p = JSON.parse(raw);
        state.firstName = p.firstName || "";
        state.age = p.age || "";
        state.lang = p.lang || "hi";
        state.userId = p.userId || (normId(state.firstName) + state.age);
        return !!state.userId;
      } catch {
        return false;
      }
    }

    function initAfterProfile(){
      els.topbar.classList.add("show");
      els.namePill.textContent = state.firstName;
      els.lang.value = state.lang;
      applyUIText();
      loadCards();
    }

    function goHome(){
      showScreen("screenHome");
      stopSpeaking();
      if (recognition && listening) recognition.stop();
    }

    async function loadCards(){
      try{
        const res = await fetch("/cards/manan_cards.json");
        const data = await res.json();
        state.cards = Array.isArray(data) ? data : [];
      } catch {
        state.cards = [];
      }
      renderTopicCard();
    }

    function renderTopicCard(){
      if (!els.topicCard) return;
      if (!state.cards.length){
        els.topicCard.textContent = "...";
        els.topicCount.textContent = "";
        return;
      }
      if (state.cardIndex < 0) state.cardIndex = 0;
      if (state.cardIndex >= state.cards.length) state.cardIndex = state.cards.length - 1;
      const card = state.cards[state.cardIndex] || {};
      const text = card[state.lang] || card.en || card.hi || card.gu || "";
      els.topicCard.textContent = text;
      els.topicCount.textContent = t().topicCount(state.cardIndex + 1, state.cards.length);
    }

    function prevCard(){
      if (!state.cards.length) return;
      state.cardIndex = (state.cardIndex - 1 + state.cards.length) % state.cards.length;
      renderTopicCard();
    }

    function nextCard(){
      if (!state.cards.length) return;
      state.cardIndex = (state.cardIndex + 1) % state.cards.length;
      renderTopicCard();
    }

    function currentCardText(){
      if (!state.cards.length) return "";
      const card = state.cards[state.cardIndex] || {};
      return String(card[state.lang] || card.en || card.hi || card.gu || "").trim();
    }

    function renderPromptChip(){
      if (!state.seedPrompt){
        els.promptChip.style.display = "none";
        els.promptChip.textContent = "";
        return;
      }
      els.promptChip.style.display = "block";
      els.promptChip.textContent = `${t().topicChip}: ${state.seedPrompt}`;
    }

    function openStories(){
      if (!state.userId) return;
      window.open(`/u/${encodeURIComponent(state.userId)}`, "_blank");
    }

    async function apiTurn(text, seedPrompt){
      const body = {
        user_id: state.userId,
        text: String(text || ""),
        lang: state.lang,
      };
      if (seedPrompt !== undefined && String(seedPrompt || "").trim() !== "") {
        body.seed_prompt = String(seedPrompt).trim();
      }
      const res = await fetch("/api/turn", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!data || data.error) throw new Error(data?.error || "Server error");
      state.lastServerData = data;
      return data;
    }

    function renderServerData(data){
      if (!data) return;
      if (data.seed_prompt !== undefined) {
        state.seedPrompt = String(data.seed_prompt || "").trim();
        renderPromptChip();
      }

      if (data.screen === "BUILD") {
        els.agentText.textContent = data.agent_prompt || t().loading;
        showScreen("screenStory");
        return;
      }

      if (data.screen === "REVIEW") {
        const title = data.draft?.title ? data.draft.title : "";
        const body = data.draft?.body ? data.draft.body : "";
        els.draftBox.textContent = title ? `${title}\n\n${body}` : body;
        showScreen("screenReview");
        return;
      }

      if (data.screen === "SUCCESS") {
        showScreen("screenSuccess");
        return;
      }

      els.agentText.textContent = data.agent_prompt || t().loading;
      showScreen("screenStory");
    }

    async function beginStoryMode(){
      stopSpeaking();
      state.seedPrompt = "";
      renderPromptChip();
      els.agentText.textContent = t().loading;
      showScreen("screenStory");
      try {
        setBusy(true);
        await apiTurn("RESET");
        const data = await apiTurn("1");
        renderServerData(data);
      } catch {
        els.agentText.textContent = t().connectError;
      } finally {
        setBusy(false);
      }
    }

    function goToTopics(){
      stopSpeaking();
      renderTopicCard();
      showScreen("screenTopics");
    }

    async function selectPrompt(){
      const prompt = currentCardText();
      if (!prompt) return;
      stopSpeaking();
      state.seedPrompt = prompt;
      renderPromptChip();
      els.agentText.textContent = t().loading;
      showScreen("screenStory");
      try {
        setBusy(true);
        await apiTurn("RESET");
        await apiTurn("", prompt);
        const data = await apiTurn("YES");
        renderServerData(data);
      } catch {
        els.agentText.textContent = t().connectError;
      } finally {
        setBusy(false);
      }
    }

    async function sendChunk(text){
      const message = String(text || "").trim();
      if (!message) return;
      stopSpeaking();
      try {
        setBusy(true);
        els.agentText.textContent = t().loading;
        const data = await apiTurn(message);
        renderServerData(data);
      } catch {
        els.agentText.textContent = t().connectError;
      } finally {
        setBusy(false);
      }
    }

    async function sendTyped(){
      const value = String(els.typeInput.value || "").trim();
      if (!value) return;
      els.typeInput.value = "";
      await sendChunk(value);
    }

    function toggleTyping(){
      state.typingOpen = !state.typingOpen;
      els.typingArea.classList.toggle("hidden", !state.typingOpen);
      applyUIText();
      if (state.typingOpen) {
        setTimeout(() => els.typeInput.focus(), 50);
      }
    }

    async function finishStory(){
      await sendChunk("DONE");
    }

    async function saveStory(){
      await sendChunk("YES");
    }

    async function editStory(){
      await sendChunk("NO");
    }

    function langToLocale(lang){
      if (lang === "hi") return "hi-IN";
      if (lang === "gu") return "gu-IN";
      return "en-IN";
    }

    function speakAgentText(){
      const text = String(els.agentText.textContent || "").trim();
      if (!text || !("speechSynthesis" in window)) return;
      stopSpeaking();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = langToLocale(state.lang);
      window.speechSynthesis.speak(utterance);
    }

    function stopSpeaking(){
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let listening = false;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.interimResults = false;
      recognition.continuous = true;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        listening = true;
        els.micBtn.classList.add("listening");
        els.micHint.textContent = t().micListening;
      };

      recognition.onend = () => {
        listening = false;
        els.micBtn.classList.remove("listening");
        els.micHint.textContent = t().micHint;
      };

      recognition.onerror = () => {
        els.micBtn.classList.remove("listening");
        listening = false;
        els.micHint.textContent = t().micBlocked;
      };

      recognition.onresult = async (event) => {
        let fullText = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          fullText += event.results[i][0].transcript + " ";
        }
        const chunk = fullText.trim();
        if (!chunk) return;
        if (chunk.toLowerCase() === "done") {
          recognition.stop();
          await finishStory();
          return;
        }
        await sendChunk(chunk);
      };
    }

    function toggleMic(){
      if (!recognition || state.busy) return;
      if (listening) {
        recognition.stop();
        return;
      }
      recognition.lang = langToLocale(state.lang);
      try {
        recognition.start();
      } catch {}
    }

    els.typeInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendTyped();
      }
    });

    let touchStartX = 0;
    let touchEndX = 0;
    els.topicCard.addEventListener("touchstart", (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    els.topicCard.addEventListener("touchend", (e) => {
      touchEndX = e.changedTouches[0].screenX;
      const diff = touchEndX - touchStartX;
      if (Math.abs(diff) < 40) return;
      if (diff > 0) prevCard();
      if (diff < 0) nextCard();
    }, { passive: true });

    els.lang.addEventListener("change", () => {
      state.lang = els.lang.value;
      applyUIText();
    });

    function init(){
      if (loadProfile()) {
        initAfterProfile();
        goHome();
      } else {
        applyUIText();
        showScreen("screenWelcome");
      }
    }

    init();

    window.saveProfile = saveProfile;
    window.openStories = openStories;
    window.beginStoryMode = beginStoryMode;
    window.goToTopics = goToTopics;
    window.prevCard = prevCard;
    window.nextCard = nextCard;
    window.selectPrompt = selectPrompt;
    window.toggleTyping = toggleTyping;
    window.sendTyped = sendTyped;
    window.finishStory = finishStory;
    window.saveStory = saveStory;
    window.editStory = editStory;
    window.goHome = goHome;
    window.toggleMic = toggleMic;
    window.speakAgentText = speakAgentText;
  </script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/service-worker.js")
        .catch((err) => console.error("Service worker registration failed:", err));
    });
  }
  </script>
</body>
</html>
