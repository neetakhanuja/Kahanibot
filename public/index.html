<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kahani — Story Builder</title>

  <style>
    :root{
      --bg:#f7f5f2;
      --card:#ffffff;
      --border:#e6e2dc;
      --text:#1f1f1f;
      --muted:#6b6b6b;
      --accent:#2f6f4e;
      --mic:#6b4eff;
      --micOn:#d43b3b;
      --soft:#f1efe9;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:var(--bg);
      color:var(--text);
      height:100vh;
      overflow:hidden;
    }
    .wrap{
      max-width:820px;
      margin:0 auto;
      height:100vh;
      display:flex;
      flex-direction:column;
    }
    header{
      padding:14px 14px 6px;
      text-align:center;
      font-size:22px;
      font-weight:750;
    }
    .sub{
      text-align:center;
      font-size:15px;
      color:var(--muted);
      margin:0 14px 10px;
    }

    .topRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:0 12px 10px;
    }
    .pill{
      font-size:13px;
      color:#333;
      background:#fff;
      border:1px solid var(--border);
      border-radius:999px;
      padding:8px 10px;
      max-width:55%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .topActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .main{
      flex:1;
      padding:0 12px 12px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .screen{ display:none; flex:1; overflow:hidden; }
    .screen.active{ display:flex; flex-direction:column; gap:12px; }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .label{
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
    }

    input, select{
      width:100%;
      font-size:18px;
      padding:12px 12px;
      border:1px solid #d6d2cc;
      border-radius:12px;
      outline:none;
      background:#fff;
    }
    button{
      font-size:17px;
      padding:12px 14px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      white-space:nowrap;
    }
    .primary{
      background:var(--accent);
      color:#fff;
      width:100%;
      font-size:18px;
      padding:14px 14px;
      border-radius:14px;
    }
    .secondary{
      background:var(--soft);
      border:1px solid var(--border);
      color:#333;
    }
    .secondary[disabled],
    .primary[disabled]{
      opacity:0.6;
      cursor:not-allowed;
    }

    /* BUILDER v2 layout (A) */
    .builder{
      flex:1;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .promptStage{
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:16px;
      padding:8px 8px 0;
      overflow:hidden;
    }
    #promptBig{
      width:100%;
      max-width:720px;
      text-align:center;
      font-size:26px;
      line-height:1.35;
      padding:18px 18px;
      border-radius:18px;
      background:var(--card);
      border:1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      white-space:pre-wrap;
    }
    .controlsRow{
      width:100%;
      max-width:720px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:8px 6px;
    }
    .doneBtn{
      min-width:92px;
      padding:14px 14px;
      border-radius:14px;
    }
    .micZone{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .micBtn{
      width:98px;
      height:98px;
      border-radius:999px;
      background:var(--mic);
      display:flex;
      align-items:center;
      justify-content:center;
      border:none;
      cursor:pointer;
      box-shadow: 0 12px 28px rgba(107,78,255,0.22);
    }
    .micBtn.listening{
      background:var(--micOn);
      box-shadow: 0 12px 28px rgba(212,59,59,0.18);
    }
    .micIcon{ width:38px; height:38px; fill:#fff; }
    #micHint{
      font-size:14px;
      color:var(--muted);
      text-align:center;
      line-height:1.35;
      max-width:520px;
    }

    .typeDock{
      width:100%;
      max-width:720px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:10px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .typeTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }
    .smallLink{
      background:transparent;
      border:1px solid var(--border);
      color:#333;
      padding:10px 12px;
      border-radius:12px;
      font-size:15px;
    }
    .smallLink[disabled]{ opacity:0.6; cursor:not-allowed; }

    #typeArea{ display:none; gap:10px; }
    #typeArea.open{ display:flex; }
    #typeInput{ flex:1; min-width:0; }
    .sendBtn{ background:var(--accent); color:#fff; min-width:86px; }
    .sendBtn[disabled]{ opacity:0.6; cursor:not-allowed; }

    /* Collapsible story */
    #storyPanel{ display:none; margin-top:10px; }
    #storyPanel.open{ display:block; }
    #storyBox{
      max-height:26vh;
      overflow:auto;
      font-size:18px;
      line-height:1.7;
      white-space:pre-wrap;
      padding:12px;
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
    }

    /* REVIEW + SUCCESS */
    #draftBox{
      font-size:18px;
      line-height:1.7;
      white-space:pre-wrap;
      max-height:52vh;
      overflow:auto;
    }
    .btnRow{ display:flex; gap:10px; }
    .btnRow button{ flex:1; }
    .tiny{
      font-size:13px;
      color:var(--muted);
      line-height:1.4;
      margin-top:10px;
    }

    @media (max-width:480px){
      #promptBig{ font-size:22px; }
      .micBtn{ width:92px; height:92px; }
      .doneBtn{ min-width:86px; }
      .pill{ max-width:48%; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>Kahani</header>
    <div class="sub" id="subtitle">Speak freely. The agent will guide you.</div>

    <div class="topRow">
      <div class="pill" id="whoPill" style="display:none;"></div>
      <div class="topActions">
        <button class="secondary" id="storiesBtn" style="display:none;" onclick="openStories()">My Stories</button>
        <button class="secondary" id="newBtn" style="display:none;" onclick="startNewStory()">New Story</button>
      </div>
    </div>

    <div class="main">

      <!-- WELCOME -->
      <div class="screen active" id="screenWelcome">
        <div class="card">
          <div class="label">First name</div>
          <input id="firstName" placeholder="e.g., Shanta" />

          <div style="height:10px;"></div>

          <div class="label">Age</div>
          <input id="age" inputmode="numeric" placeholder="e.g., 67" />

          <div style="height:10px;"></div>

          <div class="label">Language</div>
          <select id="lang">
            <option value="hi">Hindi</option>
            <option value="gu">Gujarati</option>
            <option value="en">English</option>
          </select>

          <div style="height:14px;"></div>

          <button class="primary" onclick="saveProfile()">Continue</button>

          <div class="tiny">
            Tip: On phones, microphone works best over HTTPS (Render).
          </div>
        </div>
      </div>

      <!-- BUILDER (v2) -->
      <div class="screen" id="screenBuilder">
        <div class="builder">
          <div class="promptStage">
            <div id="promptBig">…</div>

            <div class="controlsRow">
              <button class="secondary doneBtn" id="doneBtn" onclick="endStory()">Done</button>

              <div class="micZone">
                <button class="micBtn" id="micBtn" onclick="toggleMic()" title="Speak">
                  <svg class="micIcon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
                  </svg>
                </button>
                <div id="micHint">Tap mic, speak. When finished, tap Done.</div>
              </div>

              <button class="secondary doneBtn" id="cardsBtn" onclick="pickCard()">Pick a Prompt</button>
            </div>

            <div class="typeDock">
              <div class="typeTop">
                <button class="smallLink" id="typeToggle" onclick="toggleTyping()">Type</button>
                <button class="smallLink" id="storyToggle" onclick="toggleStoryPanel()">Show story</button>
              </div>

              <div id="typeArea">
                <input id="typeInput" placeholder="Type (optional)" />
                <button class="sendBtn" id="sendTypedBtn" onclick="sendTyped()">Send</button>
              </div>

              <div id="storyPanel">
                <div class="label" style="margin:10px 0 8px;">Your story so far</div>
                <div id="storyBox"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- REVIEW -->
      <div class="screen" id="screenReview">
        <div class="card">
          <div class="label">Review</div>
          <div id="draftBox"></div>

          <div style="height:12px;"></div>

          <div class="btnRow">
            <button class="primary" onclick="saveStoryYes()">Save</button>
            <button class="secondary" onclick="reviseStory()">Change</button>
          </div>

          <div class="tiny">
            Save writes to Google Sheets and appears in “My Stories”.
          </div>
        </div>
      </div>

      <!-- SUCCESS -->
      <div class="screen" id="screenSuccess">
        <div class="card">
          <div style="font-size:18px; line-height:1.6;" id="successMsg">
            Saved. Thank you for sharing.
          </div>
          <div style="height:12px;"></div>
          <button class="primary" onclick="startNewStory()">Make another story</button>
          <div style="height:10px;"></div>
          <button class="secondary" onclick="openStories()">View My Stories</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    function normId(s){ return String(s||"").toLowerCase().replace(/\s+/g,""); }

    const state = {
      userId: null,
      firstName: null,
      age: null,
      lang: "hi",
      busy: false,
      lastStoryText: "",
      cards: [
        // Simple starter prompts (we will replace with your MANAN deck content next)
        { hi:"जब मैं छोटा/छोटी थी…", gu:"જ્યારે હું નાનો/નાની હતો…", en:"When I was younger…" },
        { hi:"मेरी सबसे प्यारी याद…", gu:"મારી સૌથી ગમતી યાદ…", en:"A memory I love…" },
        { hi:"एक ऐसा दिन जो मैं नहीं भूलता/भूलती…", gu:"એક એવો દિવસ જે હું ભૂલતો/ભૂલતી નથી…", en:"A day I never forget…" },
        { hi:"मेरे स्कूल का एक किस्सा…", gu:"મારા શાળાનો એક કિસ્સો…", en:"A story from my school…" },
        { hi:"किसी ने जो बात मुझे याद रह गई…", gu:"કોઈએ કહ્યું એવું જે યાદ રહી ગયું…", en:"Something someone said that stayed with me…" }
      ]
    };

    const els = {
      subtitle: document.getElementById("subtitle"),
      whoPill: document.getElementById("whoPill"),
      storiesBtn: document.getElementById("storiesBtn"),
      newBtn: document.getElementById("newBtn"),

      screenWelcome: document.getElementById("screenWelcome"),
      screenBuilder: document.getElementById("screenBuilder"),
      screenReview: document.getElementById("screenReview"),
      screenSuccess: document.getElementById("screenSuccess"),

      firstName: document.getElementById("firstName"),
      age: document.getElementById("age"),
      lang: document.getElementById("lang"),

      promptBig: document.getElementById("promptBig"),
      storyToggle: document.getElementById("storyToggle"),
      storyPanel: document.getElementById("storyPanel"),
      storyBox: document.getElementById("storyBox"),

      typeArea: document.getElementById("typeArea"),
      typeToggle: document.getElementById("typeToggle"),
      typeInput: document.getElementById("typeInput"),
      sendTypedBtn: document.getElementById("sendTypedBtn"),

      micBtn: document.getElementById("micBtn"),
      micHint: document.getElementById("micHint"),

      draftBox: document.getElementById("draftBox"),
      successMsg: document.getElementById("successMsg"),
      doneBtn: document.getElementById("doneBtn"),
      cardsBtn: document.getElementById("cardsBtn"),
    };

    function showScreen(id){
      ["screenWelcome","screenBuilder","screenReview","screenSuccess"].forEach(k=>{
        document.getElementById(k).classList.remove("active");
      });
      document.getElementById(id).classList.add("active");
    }

    function setBusy(on){
      state.busy = !!on;
      els.sendTypedBtn.disabled = state.busy;
      els.doneBtn.disabled = state.busy;
      els.typeToggle.disabled = state.busy;
      els.micBtn.disabled = state.busy;
      els.storyToggle.disabled = state.busy;
      els.cardsBtn.disabled = state.busy;
    }

    function loadProfile(){
      const raw = localStorage.getItem("kahanibot_profile_v2");
      if (!raw) return false;
      try{
        const p = JSON.parse(raw);
        state.userId = p.userId;
        state.firstName = p.firstName;
        state.age = p.age;
        state.lang = p.lang || "hi";
        return true;
      }catch{ return false; }
    }

    function initAfterProfile(){
      els.whoPill.style.display = "block";
      els.whoPill.textContent = state.firstName;
      els.storiesBtn.style.display = "inline-block";
      els.newBtn.style.display = "inline-block";
      els.subtitle.textContent = "Speak freely. The agent will guide you.";
      els.lang.value = state.lang;
    }

    function saveProfile(){
      const fn = String(els.firstName.value||"").trim();
      const age = String(els.age.value||"").trim();
      const lang = els.lang.value;

      if (!fn || !age){
        alert("Please enter first name and age.");
        return;
      }

      const userId = normId(fn) + age; // e.g., shanta67

      state.userId = userId;
      state.firstName = fn;
      state.age = age;
      state.lang = lang;

      localStorage.setItem("kahanibot_profile_v2", JSON.stringify({
        userId, firstName: fn, age, lang
      }));

      initAfterProfile();
      startNewStory();
    }

    function openStories(){
      if (!state.userId) return;
      window.open(`/u/${encodeURIComponent(state.userId)}`, "_blank");
    }

    function setStorySoFar(storyText){
      const t = String(storyText || "");
      state.lastStoryText = t;
      els.storyBox.textContent = t;
      els.storyBox.scrollTop = els.storyBox.scrollHeight;
    }

    function langToSpeechLocale(lang){
      if (lang === "hi") return "hi-IN";
      if (lang === "gu") return "gu-IN";
      return "en-US";
    }

    async function apiTurn(text){
      const res = await fetch("/api/turn", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          user_id: state.userId,
          text: String(text || ""),
          lang: state.lang
        })
      });
      const data = await res.json();
      if (!data || data.error) throw new Error(data?.error || "Server error");
      return data;
    }

    function renderFromServer(data){
      if (data.story_so_far !== undefined) {
        setStorySoFar(data.story_so_far);
      }

      if (data.screen === "BUILD") {
        els.promptBig.textContent = data.agent_prompt || "";
        showScreen("screenBuilder");
        return;
      }

      if (data.screen === "REVIEW") {
        const title = data.draft?.title ? data.draft.title : "";
        const body  = data.draft?.body  ? data.draft.body  : "";
        els.draftBox.textContent = (title ? title + "\n\n" : "") + body;
        showScreen("screenReview");
        return;
      }

      if (data.screen === "SUCCESS") {
        els.successMsg.textContent = data.agent_prompt || "Saved. Thank you for sharing.";
        showScreen("screenSuccess");
        return;
      }

      // fallback
      els.promptBig.textContent = data.agent_prompt || "";
      showScreen("screenBuilder");
    }

    async function syncOnLoad(){
      try{
        setBusy(true);
        const data = await apiTurn("");
        renderFromServer(data);
      } catch(e){
        els.promptBig.textContent = "Could not connect to server.";
        showScreen("screenBuilder");
      } finally {
        setBusy(false);
      }
    }

    async function sendChunk(userText){
      const t = String(userText||"").trim();
      if (!t) return;

      try{
        setBusy(true);
        els.promptBig.textContent = "…";
        const data = await apiTurn(t);
        renderFromServer(data);
      } catch(e){
        els.promptBig.textContent = "Server error. Please try again.";
      } finally {
        setBusy(false);
      }
    }

    async function startNewStory(){
      // Soft reset: if there is a story in progress, finalize + discard to reset backend state
      const current = (state.lastStoryText || "").trim();

      showScreen("screenBuilder");
      els.promptBig.textContent = "…";
      setStorySoFar("");

      try{
        setBusy(true);

        if (current.length > 0) {
          await apiTurn("DONE");
          await apiTurn("NO");
        }

        const data = await apiTurn("");
        renderFromServer(data);
      } catch(e){
        els.promptBig.textContent = "Could not start a new story.";
      } finally {
        setBusy(false);
      }
    }

    async function endStory(){
      await sendChunk("DONE");
    }

    async function saveStoryYes(){
      await sendChunk("YES");
    }

    async function reviseStory(){
      await sendChunk("NO");
    }

    // Typing UI
    function toggleTyping(){
      const open = els.typeArea.classList.toggle("open");
      els.typeToggle.textContent = open ? "Hide typing" : "Type";
      if (open) setTimeout(()=>els.typeInput.focus(), 50);
    }

    async function sendTyped(){
      const t = els.typeInput.value.trim();
      if (!t) return;
      els.typeInput.value = "";
      await sendChunk(t);
    }

    els.typeInput.addEventListener("keydown", (e)=>{
      if (e.key === "Enter"){
        e.preventDefault();
        sendTyped();
      }
    });

    // Story panel
    function toggleStoryPanel(){
      const open = els.storyPanel.classList.toggle("open");
      els.storyToggle.textContent = open ? "Hide story" : "Show story";
      if (open) {
        els.storyBox.scrollTop = els.storyBox.scrollHeight;
      }
    }

    // Cards (starter prompts)
    async function pickCard(){
      const pack = state.cards;
      const c = pack[Math.floor(Math.random() * pack.length)];
      const prompt = (c && (c[state.lang] || c.en)) || "";
      if (!prompt) return;

      // Put the card prompt into the story (as a starter line), and let AI respond.
      await sendChunk(prompt);
    }

    // Speech to text
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let listening = false;

    if (SpeechRecognition){
      recognition = new SpeechRecognition();
      recognition.interimResults = false;
      recognition.continuous = true;   // keep listening
      recognition.maxAlternatives = 1;

      recognition.onstart = ()=>{
        listening = true;
        els.micBtn.classList.add("listening");
        els.micHint.textContent = "Listening… tap mic again to stop";
      };

      recognition.onend = ()=>{
        listening = false;
        els.micBtn.classList.remove("listening");
        els.micHint.textContent = "Tap mic, speak. When finished, tap Done.";
      };

      recognition.onerror = ()=>{
        els.promptBig.textContent = "Mic permission blocked. Try HTTPS (Render) or use typing.";
      };

      recognition.onresult = async (event) => {
        let fullText = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          fullText += event.results[i][0].transcript + " ";
        }
        const chunk = fullText.trim();
        if (!chunk) return;

        if (chunk.toLowerCase() === "done") {
          recognition.stop();
          await sendChunk("DONE");
          return;
        }

        await sendChunk(chunk);
      };
    } else {
      els.micHint.textContent = "Mic not supported in this browser.";
    }

    function toggleMic(){
      if (!recognition) return;
      if (state.busy) return;

      if (listening){
        recognition.stop();
        return;
      }
      recognition.lang = langToSpeechLocale(state.lang);
      try{ recognition.start(); } catch(e){}
    }

    // Init
    if (loadProfile()){
      initAfterProfile();
      showScreen("screenBuilder");
      syncOnLoad();
    } else {
      showScreen("screenWelcome");
    }

    // Expose to buttons
    window.saveProfile = saveProfile;
    window.openStories = openStories;
    window.startNewStory = startNewStory;
    window.toggleTyping = toggleTyping;
    window.sendTyped = sendTyped;
    window.toggleStoryPanel = toggleStoryPanel;
    window.toggleMic = toggleMic;
    window.endStory = endStory;
    window.saveStoryYes = saveStoryYes;
    window.reviseStory = reviseStory;
    window.pickCard = pickCard;
  </script>
</body>
</html>
